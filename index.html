<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>Task master</title>

    <style>
        /* ===== ROOT VARIABLES (Modern color system) ===== */
        :root {
            --bg-color: #f4f6fb;
            --card-color: #ffffff;
            --primary: #4f46e5;
            --text-color: #333;
            --border-radius: 12px;
        }

        /* ===== DARK MODE VARIABLES ===== */
        .dark {
            --bg-color: #1e1e2f;
            --card-color: #2c2c3f;
            --primary: #6366f1;
            --text-color: #f1f1f1;
        }

        /* ===== GLOBAL STYLES ===== */
        body {
            margin: 0; /* Remove default spacing */
            font-family: Arial, sans-serif; /* Clean readable font */
            background-color: var(--bg-color); /* Dynamic background */
            color: var(--text-color); /* Dynamic text color */
            display: flex; /* Center content */
            justify-content: center;
            align-items: center;
            height: 100vh;
            transition: 0.3s ease; /* Smooth theme transition */
        }

        /* ===== MAIN CONTAINER ===== */
        .app {
            background: var(--card-color); /* Card background */
            padding: 20px;
            width: 350px;
            border-radius: var(--border-radius); /* Rounded corners */
            box-shadow: 0 8px 20px rgba(0,0,0,0.1); /* Soft shadow */
        }

        h2 {
            text-align: center; /* Center heading */
        }

        /* ===== INPUT SECTION ===== */
        .input-group {
            display: flex; /* Align input and button */
            gap: 10px;
        }

        input {
            flex: 1; /* Take remaining space */
            padding: 10px;
            border-radius: var(--border-radius);
            border: 1px solid #ccc;
            outline: none;
        }

        button {
            padding: 10px;
            border: none;
            border-radius: var(--border-radius);
            background-color: var(--primary);
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            opacity: 0.9; /* Simple hover effect */
        }

        /* ===== TASK LIST ===== */
        ul {
            list-style: none; /* Remove bullet points */
            padding: 0;
            margin-top: 20px;
        }

        li {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            margin-bottom: 10px;
            background: var(--bg-color);
            border-radius: var(--border-radius);
            cursor: pointer;
        }

        /* Completed task style */
        .completed {
            text-decoration: line-through;
            opacity: 0.6;
        }

        /* Delete button style */
        .delete-btn {
            background: crimson;
            padding: 5px 8px;
            font-size: 12px;
        }

        /* ===== DARK MODE TOGGLE ===== */
        .toggle-container {
            text-align: right;
            margin-bottom: 10px;
        }

    </style>
</head>

<body>

    <div class="app"> <!-- Main app container -->

        <!-- Dark Mode Toggle Button -->
        <div class="toggle-container">
            <button onclick="toggleTheme()">Toggle Theme</button>
        </div>

        <h2>Task Master</h2> <!-- App title -->

        <!-- Input and Add Button -->
        <div class="input-group">
            <input type="text" id="taskInput" placeholder="Enter a task...">
            <button onclick="addTask()">Add</button>
        </div>

        <!-- Task List -->
        <ul id="taskList"></ul>

    </div>

    <script>
        // Select input and task list elements
        const taskInput = document.getElementById("taskInput");
        const taskList = document.getElementById("taskList");

        // ===== ADD TASK FUNCTION =====
        function addTask() {

            const taskText = taskInput.value.trim(); // Remove extra spaces

            if (taskText === "") return; // Prevent empty tasks

            const li = document.createElement("li"); // Create list item
            li.textContent = taskText; // Set task text

            // Toggle completed class when clicked
            li.onclick = function() {
                li.classList.toggle("completed");
            };

            // Create delete button
            const deleteBtn = document.createElement("button");
            deleteBtn.textContent = "X";
            deleteBtn.className = "delete-btn";

            // Remove task when delete button clicked
            deleteBtn.onclick = function(event) {
                event.stopPropagation(); // Prevent toggle when deleting
                li.remove();
            };

            li.appendChild(deleteBtn); // Add delete button to task
            taskList.appendChild(li); // Add task to list

            taskInput.value = ""; // Clear input field
        }

        // ===== THEME TOGGLE FUNCTION =====
        function toggleTheme() {
            document.body.classList.toggle("dark"); // Switch dark class
        }

        // Allow pressing Enter key to add task
        taskInput.addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                addTask();
            }
        });

    </script>

</body>
</html>
